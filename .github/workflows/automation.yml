name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/bot:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APPTOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ secrets.SSH_USER }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MONGO_DB_NAME: ${{ vars.MONGO_DB_NAME || 'recall_bot' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          SCHEDULER_TZ: ${{ vars.SCHEDULER_TZ || 'UTC' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: APPTOKEN,USERNAME,BOT_TOKEN,MONGO_DB_NAME,LOG_LEVEL,SCHEDULER_TZ
          script: |
            set -e
            echo "Starting deployment..."
            cd ${{ secrets.DEPLOY_PATH }}

            git checkout main
            git pull

            # Render .env from CI secrets so the bot container picks up TOKEN etc.
            umask 077
            cat > .env <<EOF
            TOKEN=$BOT_TOKEN
            MONGO_DB_NAME=$MONGO_DB_NAME
            LOG_LEVEL=$LOG_LEVEL
            SCHEDULER_TZ=$SCHEDULER_TZ
            EOF

            echo $APPTOKEN | docker login ghcr.io -u $USERNAME --password-stdin
            docker compose pull
            docker compose up -d

            echo "Deployment complete"
