services:
  bot:
    image: ghcr.io/romanychev-l/recall_bot/bot:latest
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
    depends_on:
      - mongo

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
